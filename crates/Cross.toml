# cross (https://github.com/cross-rs/cross) config for cross-compiling the
# aarch64 `qbz` binary from an x86-64 Linux host. Used by
# scripts/build-aarch64-linux.sh (CROSS mode).
#
# The default cross image ships the aarch64 toolchain but NOT the native dev
# libs qbz links against, so we add the arm64 multiarch packages in pre-build.
# PKG_CONFIG_* is set so the build scripts resolve the :arm64 .pc files.
#
# NOTE: each pre-build entry is a single-line TOML string (no backslash
# continuations — those are only valid in TOML """multi-line""" strings).

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    "apt-get install -y --no-install-recommends pkg-config cmake clang libclang-dev nasm libasound2-dev:arm64 libjack-jackd2-dev:arm64 libfontconfig1-dev:arm64 libfreetype-dev:arm64 libxkbcommon-dev:arm64 libwayland-dev:arm64 libxcb1-dev:arm64 libgl1-mesa-dev:arm64 libegl1-mesa-dev:arm64 libdbus-1-dev:arm64 libssl-dev:arm64",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
    "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig",
    "PKG_CONFIG_SYSROOT_DIR=/",
]
