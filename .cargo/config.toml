# Enable CPU intrinsics for AES-NI + SSSE3.
#
# The qbz-cmaf crate does AES-128-CTR decrypt on every offline-cached
# audio frame. Without AES-NI the decrypt falls back to a software
# implementation that hits ~10 MB/s on a modern CPU; with AES-NI it
# clears 400+ MB/s. For HiRes (200 MB+ tracks) this is the difference
# between a 20-second gap and a sub-second one.
#
# `target-cpu=x86-64-v3` = Haswell baseline (2013+). Every CPU that
# QBZ realistically runs on supports it. If we later ship prebuilt
# binaries for older CPUs we can switch to a runtime-dispatch path,
# but for self-built and workstation-compiled binaries this is the
# right default.
[build]
rustflags = ["-C", "target-cpu=x86-64-v3"]
