# nfpm config — builds .deb and .rpm from the prebuilt Slint binary.
# Used by release-linux(.yml/-aarch64.yml): nfpm package -f this-file -p deb|rpm
#
# Interpolated env (exported by the workflow):
#   QBZ_VERSION  release version without the v prefix (e.g. 2.0.0)
#   QBZ_ARCH     deb-style arch: amd64 | arm64
#   QBZ_BINARY   path to the stripped release binary (crates/target/.../qbz)
#
# Runtime deps are the MEASURED `ldd` set of the Slint binary (2026-07-02):
# alsa, fontconfig, freetype, png16, bz2, expat, zlib. The wayland/x11/GL/
# dbus/xkbcommon stack is dlopen'd by winit/glutin/wgpu at runtime, so it
# goes in Recommends — missing pieces degrade (e.g. X11 fallback) instead of
# blocking install on unusual setups.

name: qbz
arch: ${QBZ_ARCH}
platform: linux
version: ${QBZ_VERSION}
section: sound
priority: optional
maintainer: Victor Rodriguez <vicrodh@users.noreply.github.com>
description: |
  Native Qobuz client with hi-res audio support.
  Bit-perfect playback, DAC passthrough, offline cache, local library.
vendor: QBZ
homepage: https://github.com/vicrodh/qbz
license: MIT

contents:
  # LITERAL path (pre-flight 2026-07-04 caught this: nfpm does NOT expand
  # env vars in contents[].src — it printed the literal ${QBZ_BINARY} and
  # failed the glob). The workflow places the stripped binary at ./qbz
  # before invoking nfpm; keep both sides in sync.
  - src: ./qbz
    dst: /usr/bin/qbz
    file_info:
      mode: 0755
  # Installed as com.blitzfc.qbz.desktop so the AppStream metainfo's
  # <launchable> and the MPRIS DesktopEntry both resolve (review fix).
  - src: packaging/linux/qbz.desktop
    dst: /usr/share/applications/com.blitzfc.qbz.desktop
  - src: packaging/flatpak/com.blitzfc.qbz.metainfo.xml
    dst: /usr/share/metainfo/com.blitzfc.qbz.metainfo.xml
  - src: packaging/icons/32x32.png
    dst: /usr/share/icons/hicolor/32x32/apps/qbz.png
  - src: packaging/icons/48x48.png
    dst: /usr/share/icons/hicolor/48x48/apps/qbz.png
  - src: packaging/icons/64x64.png
    dst: /usr/share/icons/hicolor/64x64/apps/qbz.png
  - src: packaging/icons/128x128.png
    dst: /usr/share/icons/hicolor/128x128/apps/qbz.png
  - src: packaging/icons/256x256.png
    dst: /usr/share/icons/hicolor/256x256/apps/qbz.png
  - src: packaging/icons/512x512.png
    dst: /usr/share/icons/hicolor/512x512/apps/qbz.png

overrides:
  deb:
    depends:
      # t64 alternatives cover Ubuntu 24.04+'s time_t64 renames.
      - libasound2 | libasound2t64
      - libfontconfig1
      - libfreetype6
      - libpng16-16 | libpng16-16t64
      - libbz2-1.0
      - libexpat1
      - zlib1g
    recommends:
      - libwayland-client0
      - libxkbcommon0
      - libegl1
      - libgl1
      - libdbus-1-3
      - libxcb1
      - pipewire
  rpm:
    depends:
      # Soname-level requires survive package renames across Fedora/openSUSE
      # (e.g. zlib -> zlib-ng-compat) — every distro Provides the soname.
      - libasound.so.2()(64bit)
      - libfontconfig.so.1()(64bit)
      - libfreetype.so.6()(64bit)
      - libpng16.so.16()(64bit)
      - libbz2.so.1()(64bit)
      - libexpat.so.1()(64bit)
      - libz.so.1()(64bit)
    recommends:
      - libxkbcommon
      - libwayland-client
      - dbus-libs
      - pipewire

rpm:
  group: Applications/Multimedia
  compression: zstd

deb:
  compression: zstd
